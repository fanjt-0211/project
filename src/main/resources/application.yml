server:
  port: 8080

spring:
  application:
    name: warehouse-management
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:project}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fjt.pojo
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.fjt.mapper: debug

fjt:
  jwt:
    admin-secret-key: fjt20050211.jwt.warehouse.management.system.secret.key
    admin-ttl: 7200000
    admin-token-name: token